<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🏝️ 섬 우편함 - Island Mail</title>
<link href="https://fonts.googleapis.com/css2?family=Jua&family=Nanum+Gothic:wght@400;700&display=swap" rel="stylesheet">
<style>
  :root {
    --sky: #87CEEB;
    --sea: #4A90D9;
    --sea-dark: #2E6DA4;
    --grass: #5DBB63;
    --grass-dark: #3D8B40;
    --sand: #F5DEB3;
    --sand-dark: #D4A96A;
    --brown: #8B5E3C;
    --cream: #FFF9F0;
    --text: #3D2B1F;
    --paper: #FFFDE7;
    --shadow: rgba(61,43,31,0.15);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Nanum Gothic', sans-serif;
    background: var(--sky);
    min-height: 100vh;
    overflow-x: hidden;
    color: var(--text);
  }

  /* ===== CLOUDS ===== */
  .sky-bg {
    position: fixed;
    inset: 0;
    background: linear-gradient(180deg, #87CEEB 0%, #B8E4F9 60%, #C8EFC8 100%);
    z-index: 0;
    pointer-events: none;
  }

  .cloud {
    position: fixed;
    background: white;
    border-radius: 50px;
    opacity: 0.85;
    animation: drift linear infinite;
    z-index: 1;
  }
  .cloud::before, .cloud::after {
    content: '';
    position: absolute;
    background: white;
    border-radius: 50%;
  }
  .cloud-1 { width:100px;height:35px;top:8%;left:-120px;animation-duration:35s;animation-delay:0s; }
  .cloud-1::before { width:55px;height:55px;top:-28px;left:12px; }
  .cloud-1::after { width:38px;height:38px;top:-18px;left:45px; }
  .cloud-2 { width:70px;height:25px;top:18%;left:-90px;animation-duration:48s;animation-delay:-15s;opacity:0.65; }
  .cloud-2::before { width:38px;height:38px;top:-20px;left:8px; }
  .cloud-2::after { width:28px;height:28px;top:-12px;left:30px; }
  .cloud-3 { width:120px;height:40px;top:5%;left:-150px;animation-duration:55s;animation-delay:-30s; }
  .cloud-3::before { width:65px;height:65px;top:-35px;left:15px; }
  .cloud-3::after { width:45px;height:45px;top:-22px;left:58px; }

  @keyframes drift { from{left:-200px} to{left:110vw} }

  /* ===== APP WRAPPER ===== */
  #app {
    position: relative;
    z-index: 10;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding-bottom: 60px;
  }

  /* ===== HEADER ===== */
  .site-header {
    width: 100%;
    text-align: center;
    padding: 28px 20px 16px;
  }
  .site-logo {
    font-family: 'Jua', sans-serif;
    font-size: 2.4rem;
    color: #3D2B1F;
    text-shadow: 2px 3px 0 rgba(255,255,255,0.6), 0 0 20px rgba(255,255,255,0.4);
    letter-spacing: 1px;
  }
  .site-logo span { color: #2E6DA4; }
  .site-subtitle {
    font-size: 0.9rem;
    color: #5a4030;
    margin-top: 4px;
    opacity: 0.8;
  }

  /* ===== ISLAND SCENE ===== */
  .island-scene {
    position: relative;
    width: min(560px, 95vw);
    margin: 10px auto 0;
  }

  /* SVG Island */
  .island-svg { width: 100%; }

  /* ===== PANELS ===== */
  .panel {
    background: var(--cream);
    border-radius: 24px;
    padding: 28px;
    box-shadow: 0 8px 32px var(--shadow), 0 2px 0 rgba(255,255,255,0.8) inset;
    border: 3px solid rgba(139,94,60,0.15);
    width: min(560px, 95vw);
    margin: 16px auto;
  }

  .panel-title {
    font-family: 'Jua', sans-serif;
    font-size: 1.4rem;
    color: var(--brown);
    margin-bottom: 18px;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  /* ===== FORMS ===== */
  .field { margin-bottom: 14px; }
  .field label {
    display: block;
    font-weight: 700;
    font-size: 0.85rem;
    color: #6b4c30;
    margin-bottom: 5px;
  }
  .field input, .field textarea, .field select {
    width: 100%;
    padding: 10px 14px;
    border: 2px solid #D4B896;
    border-radius: 12px;
    font-family: 'Nanum Gothic', sans-serif;
    font-size: 0.95rem;
    background: var(--paper);
    color: var(--text);
    transition: border-color 0.2s;
    outline: none;
  }
  .field input:focus, .field textarea:focus, .field select:focus {
    border-color: var(--grass);
  }
  .field textarea { resize: vertical; min-height: 120px; line-height: 1.6; }
  .char-count { font-size: 0.78rem; color: #999; text-align: right; margin-top: 3px; }

  /* ===== BUTTONS ===== */
  .btn {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    padding: 11px 22px;
    border: none;
    border-radius: 50px;
    font-family: 'Jua', sans-serif;
    font-size: 1rem;
    cursor: pointer;
    transition: transform 0.15s, box-shadow 0.15s;
    text-decoration: none;
  }
  .btn:active { transform: scale(0.96); }
  .btn-primary {
    background: linear-gradient(135deg, #5DBB63, #3D8B40);
    color: white;
    box-shadow: 0 4px 0 #2A6B2D, 0 6px 16px rgba(61,139,64,0.3);
  }
  .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 6px 0 #2A6B2D, 0 8px 20px rgba(61,139,64,0.35); }
  .btn-sea {
    background: linear-gradient(135deg, #4A90D9, #2E6DA4);
    color: white;
    box-shadow: 0 4px 0 #1E4D7A, 0 6px 16px rgba(46,109,164,0.3);
  }
  .btn-sea:hover { transform: translateY(-2px); }
  .btn-sand {
    background: linear-gradient(135deg, #F5DEB3, #D4A96A);
    color: var(--brown);
    box-shadow: 0 4px 0 #A07840, 0 6px 16px rgba(160,120,64,0.2);
  }
  .btn-sand:hover { transform: translateY(-2px); }
  .btn-sm { padding: 7px 14px; font-size: 0.85rem; }
  .btn-full { width: 100%; justify-content: center; }

  /* ===== NAV ===== */
  .nav-bar {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
    justify-content: center;
    margin-bottom: 10px;
  }

  /* ===== LETTER CARD ===== */
  .letter-card {
    background: var(--paper);
    border: 2px solid #E8D5B5;
    border-radius: 16px;
    padding: 16px;
    margin-bottom: 12px;
    position: relative;
    cursor: pointer;
    transition: transform 0.15s, box-shadow 0.15s;
  }
  .letter-card:hover { transform: translateY(-2px); box-shadow: 0 6px 20px var(--shadow); }
  .letter-card.unread { border-color: #5DBB63; background: #F0FFF0; }
  .letter-card.unread::before {
    content: 'NEW';
    position: absolute;
    top: 10px; right: 12px;
    background: #5DBB63;
    color: white;
    font-family: 'Jua', sans-serif;
    font-size: 0.7rem;
    padding: 2px 8px;
    border-radius: 20px;
  }
  .letter-from {
    font-size: 0.82rem;
    color: #888;
    margin-bottom: 6px;
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .island-dot {
    display: inline-block;
    width: 12px; height: 12px;
    border-radius: 50%;
    flex-shrink: 0;
  }
  .letter-preview { font-size: 0.92rem; line-height: 1.5; color: var(--text); }
  .letter-date { font-size: 0.75rem; color: #aaa; margin-top: 8px; }

  /* ===== LETTER MODAL ===== */
  .modal-overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.45);
    z-index: 100;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 20px;
    animation: fadeIn 0.2s;
  }
  @keyframes fadeIn { from{opacity:0} to{opacity:1} }

  .modal-box {
    background: var(--paper);
    border-radius: 24px;
    padding: 32px 28px;
    max-width: 480px;
    width: 100%;
    position: relative;
    box-shadow: 0 20px 60px rgba(0,0,0,0.3);
    animation: popUp 0.25s cubic-bezier(.34,1.56,.64,1);
    max-height: 85vh;
    overflow-y: auto;
  }
  @keyframes popUp { from{transform:scale(0.85);opacity:0} to{transform:scale(1);opacity:1} }

  .modal-close {
    position: absolute;
    top: 14px; right: 16px;
    background: #eee;
    border: none;
    border-radius: 50%;
    width: 30px; height: 30px;
    font-size: 1.1rem;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
  }
  .modal-close:hover { background: #ddd; }

  .letter-paper {
    background: white;
    border: 1px solid #e0d0b0;
    border-radius: 8px;
    padding: 20px;
    margin: 14px 0;
    font-size: 0.95rem;
    line-height: 1.8;
    white-space: pre-wrap;
    position: relative;
  }
  .letter-paper::before {
    content: '';
    position: absolute;
    left: 40px; top: 0; bottom: 0;
    width: 1px;
    background: rgba(200,150,150,0.3);
  }

  /* ===== ISLAND GRID ===== */
  .island-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(130px, 1fr));
    gap: 12px;
    margin-top: 10px;
  }
  .island-card {
    background: var(--paper);
    border: 2px solid #E8D5B5;
    border-radius: 16px;
    padding: 14px 10px;
    text-align: center;
    cursor: pointer;
    transition: transform 0.15s, border-color 0.15s;
  }
  .island-card:hover { transform: translateY(-3px); border-color: var(--grass); }
  .island-card-name { font-family: 'Jua', sans-serif; font-size: 0.85rem; color: var(--brown); margin-top: 6px; }
  .island-card-resident { font-size: 0.75rem; color: #999; margin-top: 2px; }

  /* ===== MY ISLAND UI ===== */
  .my-island-info {
    display: flex;
    align-items: center;
    gap: 14px;
    background: rgba(255,255,255,0.6);
    border-radius: 16px;
    padding: 12px 16px;
    margin-bottom: 16px;
  }
  .my-island-icon {
    width: 50px; height: 50px;
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 1.6rem;
    flex-shrink: 0;
  }
  .my-island-text h3 { font-family: 'Jua', sans-serif; font-size: 1.1rem; color: var(--brown); }
  .my-island-text p { font-size: 0.82rem; color: #888; }

  /* ===== UNREAD BADGE ===== */
  .badge {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    background: #E74C3C;
    color: white;
    border-radius: 50%;
    width: 20px; height: 20px;
    font-size: 0.72rem;
    font-family: 'Jua', sans-serif;
    margin-left: 4px;
  }

  /* ===== TOAST ===== */
  .toast {
    position: fixed;
    bottom: 30px;
    left: 50%;
    transform: translateX(-50%) translateY(100px);
    background: #3D2B1F;
    color: white;
    padding: 12px 24px;
    border-radius: 50px;
    font-family: 'Jua', sans-serif;
    font-size: 0.95rem;
    z-index: 200;
    transition: transform 0.35s cubic-bezier(.34,1.56,.64,1);
    white-space: nowrap;
    box-shadow: 0 8px 24px rgba(0,0,0,0.25);
  }
  .toast.show { transform: translateX(-50%) translateY(0); }

  /* ===== FLYING LETTER ANIMATION ===== */
  .flying-letter {
    position: fixed;
    font-size: 2rem;
    z-index: 150;
    pointer-events: none;
    animation: flyAway 1.5s ease-in forwards;
  }
  @keyframes flyAway {
    0% { transform: translate(0,0) rotate(0deg) scale(1); opacity: 1; }
    50% { transform: translate(100px,-150px) rotate(20deg) scale(1.2); opacity: 1; }
    100% { transform: translate(300px,-350px) rotate(45deg) scale(0.3); opacity: 0; }
  }

  /* ===== EMPTY STATE ===== */
  .empty-state {
    text-align: center;
    padding: 40px 20px;
    color: #aaa;
  }
  .empty-state .icon { font-size: 3rem; display: block; margin-bottom: 12px; }
  .empty-state p { font-family: 'Jua', sans-serif; font-size: 1rem; }

  /* ===== RESPONSIVE ===== */
  @media (max-width: 480px) {
    .panel { padding: 20px 16px; }
    .site-logo { font-size: 1.9rem; }
    .island-grid { grid-template-columns: repeat(auto-fill, minmax(110px, 1fr)); }
  }

  /* ===== TABS ===== */
  .tabs { display: flex; border-bottom: 2px solid #E8D5B5; margin-bottom: 16px; }
  .tab-btn {
    flex: 1;
    padding: 10px;
    background: none;
    border: none;
    font-family: 'Jua', sans-serif;
    font-size: 0.95rem;
    color: #aaa;
    cursor: pointer;
    border-bottom: 3px solid transparent;
    margin-bottom: -2px;
    transition: color 0.2s;
  }
  .tab-btn.active { color: var(--brown); border-bottom-color: var(--grass); }

  .hidden { display: none !important; }

  /* ===== LOADING ===== */
  .loading {
    text-align: center;
    padding: 30px;
    font-family: 'Jua', sans-serif;
    color: #aaa;
    font-size: 1rem;
  }

  /* Island ID display */
  .id-box {
    background: rgba(255,255,255,0.7);
    border: 1.5px dashed #D4B896;
    border-radius: 10px;
    padding: 8px 12px;
    font-size: 0.75rem;
    color: #888;
    word-break: break-all;
    margin-top: 10px;
  }
  .id-box strong { color: var(--brown); }
</style>
</head>
<body>

<div class="sky-bg"></div>
<div class="cloud cloud-1"></div>
<div class="cloud cloud-2"></div>
<div class="cloud cloud-3"></div>

<div id="app">
  <header class="site-header">
    <div class="site-logo">🏝️ 섬 우편함 <span>Island Mail</span></div>
    <div class="site-subtitle">모르는 섬 친구에게 편지를 보내요</div>
  </header>

  <!-- ===== ONBOARDING ===== -->
  <div id="page-onboard" class="panel">
    <div class="panel-title">✉️ 나만의 섬을 만들어요</div>
    <div class="field">
      <label>내 이름</label>
      <input type="text" id="input-name" placeholder="예: 솜이" maxlength="10">
    </div>
    <div class="field">
      <label>섬 이름</label>
      <input type="text" id="input-island" placeholder="예: 별빛섬" maxlength="12">
    </div>
    <button class="btn btn-primary btn-full" onclick="createIsland()">🌱 섬 만들기</button>

    <div style="margin-top:20px; padding-top:16px; border-top:1.5px dashed #e0d0b0;">
      <div class="panel-title" style="font-size:1rem; margin-bottom:10px;">📬 이미 섬이 있어요</div>
      <div class="field">
        <label>섬 ID 입력</label>
        <input type="text" id="input-existing-id" placeholder="섬 ID를 붙여넣어요">
      </div>
      <button class="btn btn-sand btn-sm btn-full" onclick="loginIsland()">🔑 내 섬으로 돌아가기</button>
    </div>
  </div>

  <!-- ===== MAIN APP ===== -->
  <div id="page-main" class="hidden">

    <!-- Island Scene SVG -->
    <div class="island-scene">
      <svg class="island-svg" viewBox="0 0 560 260" xmlns="http://www.w3.org/2000/svg">
        <!-- Sea -->
        <ellipse cx="280" cy="230" rx="280" ry="70" fill="#4A90D9"/>
        <ellipse cx="280" cy="218" rx="240" ry="55" fill="#5BA3E8"/>
        <!-- Island -->
        <ellipse cx="280" cy="195" rx="200" ry="70" fill="#F5DEB3"/>
        <ellipse cx="280" cy="185" rx="185" ry="58" fill="#7BC67E"/>
        <!-- Sand rim -->
        <ellipse cx="280" cy="200" rx="200" ry="35" fill="#F5DEB3" opacity="0.6"/>

        <!-- Trees (dynamic, rendered by JS) -->
        <g id="svg-trees"></g>

        <!-- House -->
        <rect x="245" y="148" width="40" height="28" rx="3" fill="#E8C882"/>
        <polygon points="240,150 280,130 320,150" fill="#CC6644"/>
        <rect x="258" y="160" width="14" height="16" rx="2" fill="#7B4F2E"/>
        <!-- Windows -->
        <rect x="248" y="153" width="9" height="8" rx="1" fill="#A8D8EA"/>
        <rect x="303" y="153" width="9" height="8" rx="1" fill="#A8D8EA"/>

        <!-- Mailbox -->
        <rect x="318" y="155" width="4" height="25" fill="#8B5E3C"/>
        <rect x="312" y="148" width="18" height="12" rx="3" fill="#E74C3C" id="mailbox-body"/>
        <rect x="312" y="148" width="18" height="5" rx="3" fill="#C0392B"/>
        <rect x="319" y="152" width="5" height="3" rx="1" fill="#333"/>
        <!-- Mailbox flag -->
        <rect x="330" y="148" width="2" height="10" fill="#F39C12" id="mailbox-flag" transform-origin="330 158"/>

        <!-- Flowers -->
        <circle cx="230" cy="188" r="5" fill="#FF9EBC"/>
        <circle cx="222" cy="191" r="4" fill="#FFD700"/>
        <circle cx="340" cy="186" r="5" fill="#FF9EBC"/>
        <circle cx="350" cy="190" r="4" fill="#A8E6CF"/>

        <!-- Sea waves -->
        <path d="M 80 235 Q 100 228 120 235 Q 140 242 160 235" stroke="white" stroke-width="2" fill="none" opacity="0.5"/>
        <path d="M 360 230 Q 385 223 410 230 Q 435 237 460 230" stroke="white" stroke-width="2" fill="none" opacity="0.5"/>
      </svg>
    </div>

    <!-- My Island Info -->
    <div class="panel" id="my-island-panel">
      <div class="my-island-info">
        <div class="my-island-icon" id="my-island-icon">🏝️</div>
        <div class="my-island-text">
          <h3 id="my-island-label">내 섬</h3>
          <p id="my-island-resident">주민: </p>
        </div>
        <div style="margin-left:auto;">
          <span id="unread-badge" class="badge hidden">0</span>
        </div>
      </div>

      <div class="nav-bar">
        <button class="btn btn-primary btn-sm" onclick="showPage('write')">✉️ 편지 쓰기</button>
        <button class="btn btn-sea btn-sm" onclick="showPage('inbox')">📬 받은 편지함</button>
        <button class="btn btn-sand btn-sm" onclick="showPage('outbox')">📤 보낸 편지함</button>
        <button class="btn btn-sand btn-sm" onclick="showPage('islands')">🗺️ 섬 탐험</button>
      </div>

      <div class="id-box">
        <strong>내 섬 ID</strong> (다른 기기에서 로그인할 때 사용해요)<br>
        <span id="my-island-id-text"></span>
        <button onclick="copyIslandId()" style="margin-left:6px;background:#e8d5b5;border:none;border-radius:6px;padding:2px 8px;font-size:0.75rem;cursor:pointer;">복사</button>
      </div>
    </div>

    <!-- Write Letter -->
    <div id="page-write" class="panel hidden">
      <div class="panel-title">✉️ 편지 쓰기</div>
      <div class="field">
        <label>보낼 섬</label>
        <select id="select-target-island">
          <option value="">섬을 선택하세요</option>
          <option value="random">🎲 랜덤 섬으로 보내기</option>
        </select>
      </div>
      <div id="selected-island-preview" class="hidden" style="background:rgba(255,255,255,0.7);border-radius:12px;padding:10px 14px;margin-bottom:12px;display:flex;align-items:center;gap:8px;">
        <span id="preview-dot" class="island-dot"></span>
        <span id="preview-name" style="font-family:Jua,sans-serif;font-size:0.9rem;"></span>
        <span id="preview-resident" style="font-size:0.8rem;color:#999;"></span>
      </div>
      <div class="field">
        <label>편지 내용</label>
        <textarea id="letter-content" placeholder="안녕하세요! 처음 편지를 보내요 🌸" maxlength="500"></textarea>
        <div class="char-count"><span id="char-count">0</span>/500</div>
      </div>
      <div style="display:flex;gap:10px;">
        <button class="btn btn-sand btn-sm" onclick="showPage('main')">← 돌아가기</button>
        <button class="btn btn-primary btn-sm" style="flex:1" onclick="sendLetter()">💌 편지 보내기</button>
      </div>
    </div>

    <!-- Inbox -->
    <div id="page-inbox" class="panel hidden">
      <div class="panel-title">📬 받은 편지함</div>
      <div id="inbox-list"><div class="loading">⏳ 편지를 가져오는 중...</div></div>
      <button class="btn btn-sand btn-sm" onclick="showPage('main')" style="margin-top:8px">← 돌아가기</button>
    </div>

    <!-- Outbox -->
    <div id="page-outbox" class="panel hidden">
      <div class="panel-title">📤 보낸 편지함</div>
      <div id="outbox-list"><div class="loading">⏳ 편지를 가져오는 중...</div></div>
      <button class="btn btn-sand btn-sm" onclick="showPage('main')" style="margin-top:8px">← 돌아가기</button>
    </div>

    <!-- Islands -->
    <div id="page-islands" class="panel hidden">
      <div class="panel-title">🗺️ 다른 섬들</div>
      <div id="islands-grid" class="island-grid"><div class="loading">🏝️ 섬을 탐험 중...</div></div>
      <button class="btn btn-sand btn-sm" onclick="showPage('main')" style="margin-top:12px">← 돌아가기</button>
    </div>

  </div><!-- /page-main -->
</div><!-- /app -->

<!-- Letter Modal -->
<div id="letter-modal" class="modal-overlay hidden">
  <div class="modal-box">
    <button class="modal-close" onclick="closeModal()">✕</button>
    <div class="panel-title" id="modal-title">📜 편지</div>
    <div id="modal-from" style="font-size:0.85rem;color:#999;margin-bottom:8px;"></div>
    <div class="letter-paper" id="modal-content"></div>
    <div id="modal-date" style="font-size:0.78rem;color:#bbb;text-align:right;"></div>
    <div style="margin-top:14px;">
      <button class="btn btn-primary btn-sm" id="modal-reply-btn" onclick="replyToLetter()">↩️ 답장 쓰기</button>
    </div>
  </div>
</div>

<!-- Flying Letter -->
<div id="flying-letter" class="flying-letter hidden">💌</div>

<!-- Toast -->
<div id="toast" class="toast"></div>

<script>
const API = '';  // 같은 origin이면 빈 문자열, 다른 서버면 'http://localhost:3000'

let myIsland = null;
let allIslands = [];
let currentLetterTarget = null;
let modalReplyTarget = null;

// ===== INIT =====
window.addEventListener('load', () => {
  const savedId = localStorage.getItem('islandId');
  if (savedId) loadIsland(savedId);
  else showOnboard();
});

function showOnboard() {
  document.getElementById('page-onboard').classList.remove('hidden');
  document.getElementById('page-main').classList.add('hidden');
}

// ===== ISLAND =====
async function createIsland() {
  const name = document.getElementById('input-name').value.trim();
  const island_name = document.getElementById('input-island').value.trim();
  if (!name || !island_name) { showToast('이름과 섬 이름을 입력해주세요 🌿'); return; }

  const res = await fetch(`${API}/api/islands`, {
    method: 'POST',
    headers: {'Content-Type':'application/json'},
    body: JSON.stringify({ name, island_name })
  });
  const data = await res.json();
  if (res.ok) {
    localStorage.setItem('islandId', data.id);
    myIsland = data;
    initMainPage();
  } else {
    showToast(data.error || '오류가 발생했어요');
  }
}

async function loginIsland() {
  const id = document.getElementById('input-existing-id').value.trim();
  if (!id) { showToast('섬 ID를 입력해주세요'); return; }
  await loadIsland(id);
}

async function loadIsland(id) {
  const res = await fetch(`${API}/api/islands/${id}`);
  if (res.ok) {
    myIsland = await res.json();
    localStorage.setItem('islandId', myIsland.id);
    initMainPage();
  } else {
    showToast('섬을 찾을 수 없어요. ID를 확인해주세요.');
    localStorage.removeItem('islandId');
    showOnboard();
  }
}

function initMainPage() {
  document.getElementById('page-onboard').classList.add('hidden');
  document.getElementById('page-main').classList.remove('hidden');

  // Update island info
  document.getElementById('my-island-label').textContent = `${myIsland.island_name} 섬`;
  document.getElementById('my-island-resident').textContent = `주민: ${myIsland.name}`;
  document.getElementById('my-island-icon').style.background = myIsland.color + '33';
  document.getElementById('my-island-id-text').textContent = myIsland.id;

  // Draw trees on SVG
  drawTrees(myIsland.tree_type, myIsland.color);

  // Load islands for dropdown
  loadIslandsForDropdown();

  // Check unread
  checkUnread();

  showPage('main');
}

function drawTrees(type, color) {
  const svg = document.getElementById('svg-trees');
  const positions = [{x:180,y:178},{x:155,y:185},{x:370,y:175},{x:395,y:183}];
  svg.innerHTML = positions.map((p,i) => {
    const h = 35 + (i%2)*8;
    if (type === 'palm') {
      return `<line x1="${p.x}" y1="${p.y}" x2="${p.x}" y2="${p.y-h}" stroke="#8B5E3C" stroke-width="4"/>
              <ellipse cx="${p.x-8}" cy="${p.y-h-3}" rx="18" ry="8" fill="#5DBB63" transform="rotate(-30,${p.x-8},${p.y-h-3})"/>
              <ellipse cx="${p.x+8}" cy="${p.y-h-3}" rx="18" ry="8" fill="#7BC67E" transform="rotate(30,${p.x+8},${p.y-h-3})"/>`;
    } else if (type === 'cherry') {
      return `<line x1="${p.x}" y1="${p.y}" x2="${p.x}" y2="${p.y-h}" stroke="#8B5E3C" stroke-width="4"/>
              <circle cx="${p.x}" cy="${p.y-h-10}" r="18" fill="#FFB7C5"/>
              <circle cx="${p.x-8}" cy="${p.y-h-5}" r="12" fill="#FF9EBC"/>`;
    } else if (type === 'pine') {
      return `<line x1="${p.x}" y1="${p.y}" x2="${p.x}" y2="${p.y-h}" stroke="#8B5E3C" stroke-width="4"/>
              <polygon points="${p.x},${p.y-h-22} ${p.x-16},${p.y-h+4} ${p.x+16},${p.y-h+4}" fill="#2D7A2D"/>
              <polygon points="${p.x},${p.y-h-10} ${p.x-12},${p.y-h+10} ${p.x+12},${p.y-h+10}" fill="#3D8B40"/>`;
    } else { // oak
      return `<line x1="${p.x}" y1="${p.y}" x2="${p.x}" y2="${p.y-h}" stroke="#8B5E3C" stroke-width="5"/>
              <circle cx="${p.x}" cy="${p.y-h-8}" r="20" fill="#5DBB63"/>
              <circle cx="${p.x-8}" cy="${p.y-h-3}" r="15" fill="#7BC67E"/>`;
    }
  }).join('');
}

// ===== NAVIGATION =====
function showPage(page) {
  ['write','inbox','outbox','islands'].forEach(p => {
    document.getElementById(`page-${p}`).classList.add('hidden');
  });
  document.getElementById('my-island-panel').classList.remove('hidden');

  if (page === 'main') {
    // just show island panel
  } else if (page === 'write') {
    document.getElementById('page-write').classList.remove('hidden');
    loadIslandsForDropdown();
  } else if (page === 'inbox') {
    document.getElementById('page-inbox').classList.remove('hidden');
    loadInbox();
  } else if (page === 'outbox') {
    document.getElementById('page-outbox').classList.remove('hidden');
    loadOutbox();
  } else if (page === 'islands') {
    document.getElementById('page-islands').classList.remove('hidden');
    loadIslandsPage();
  }
}

// ===== ISLANDS DROPDOWN =====
async function loadIslandsForDropdown() {
  const res = await fetch(`${API}/api/islands?exclude=${myIsland.id}`);
  allIslands = await res.json();
  const sel = document.getElementById('select-target-island');
  sel.innerHTML = `<option value="">섬을 선택하세요</option><option value="random">🎲 랜덤 섬으로 보내기</option>`;
  allIslands.forEach(isl => {
    sel.innerHTML += `<option value="${isl.id}">${isl.island_name} 섬 (${isl.name})</option>`;
  });

  sel.addEventListener('change', () => {
    const val = sel.value;
    const preview = document.getElementById('selected-island-preview');
    if (!val) { preview.classList.add('hidden'); return; }
    if (val === 'random') {
      preview.classList.remove('hidden');
      document.getElementById('preview-dot').style.background = '#999';
      document.getElementById('preview-name').textContent = '🎲 랜덤 섬';
      document.getElementById('preview-resident').textContent = '누가 받을지 몰라요!';
      return;
    }
    const isl = allIslands.find(i => i.id === val);
    if (isl) {
      preview.classList.remove('hidden');
      document.getElementById('preview-dot').style.background = isl.color;
      document.getElementById('preview-name').textContent = `${isl.island_name} 섬`;
      document.getElementById('preview-resident').textContent = `주민: ${isl.name}`;
    }
  });
}

// ===== SEND LETTER =====
async function sendLetter(targetId = null) {
  const selVal = targetId || document.getElementById('select-target-island').value;
  const content = document.getElementById('letter-content').value.trim();
  if (!content) { showToast('편지 내용을 써주세요 ✏️'); return; }

  let toId = selVal;
  if (selVal === 'random' || !selVal) {
    const res = await fetch(`${API}/api/islands/random/${myIsland.id}`);
    if (!res.ok) { showToast('다른 섬이 아직 없어요. 더 기다려주세요!'); return; }
    const rnd = await res.json();
    toId = rnd.id;
  }

  const res = await fetch(`${API}/api/letters`, {
    method: 'POST',
    headers: {'Content-Type':'application/json'},
    body: JSON.stringify({ from_island_id: myIsland.id, to_island_id: toId, content })
  });
  const data = await res.json();
  if (res.ok) {
    // Flying letter animation
    spawnFlyingLetter();
    showToast('💌 편지가 날아갔어요!');
    document.getElementById('letter-content').value = '';
    document.getElementById('char-count').textContent = '0';
    setTimeout(() => showPage('main'), 800);
  } else {
    showToast(data.error || '오류가 발생했어요');
  }
}

// ===== INBOX =====
async function loadInbox() {
  const res = await fetch(`${API}/api/letters/inbox/${myIsland.id}`);
  const letters = await res.json();
  const el = document.getElementById('inbox-list');
  if (!letters.length) {
    el.innerHTML = `<div class="empty-state"><span class="icon">📭</span><p>아직 받은 편지가 없어요</p></div>`;
    return;
  }
  el.innerHTML = letters.map(l => `
    <div class="letter-card ${l.is_read ? '' : 'unread'}" onclick="openLetter('${l.id}', '${escHtml(l.from_island_name)}', '${escHtml(l.content)}', '${l.created_at}', '${l.from_color}', '${l.from_island_id}')">
      <div class="letter-from">
        <span class="island-dot" style="background:${l.from_color}"></span>
        ${escHtml(l.from_island_name)} 섬에서 온 편지
      </div>
      <div class="letter-preview">${escHtml(l.content.slice(0,60))}${l.content.length>60?'...':''}</div>
      <div class="letter-date">${formatDate(l.created_at)}</div>
    </div>
  `).join('');
  checkUnread();
}

// ===== OUTBOX =====
async function loadOutbox() {
  const res = await fetch(`${API}/api/letters/outbox/${myIsland.id}`);
  const letters = await res.json();
  const el = document.getElementById('outbox-list');
  if (!letters.length) {
    el.innerHTML = `<div class="empty-state"><span class="icon">📮</span><p>아직 보낸 편지가 없어요</p></div>`;
    return;
  }
  el.innerHTML = letters.map(l => `
    <div class="letter-card" onclick="openLetter('${l.id}', '${escHtml(l.to_island_name)}', '${escHtml(l.content)}', '${l.created_at}', '${l.to_color}', null, true)">
      <div class="letter-from">
        <span class="island-dot" style="background:${l.to_color}"></span>
        → ${escHtml(l.to_island_name)} 섬으로 보낸 편지
      </div>
      <div class="letter-preview">${escHtml(l.content.slice(0,60))}${l.content.length>60?'...':''}</div>
      <div class="letter-date">${formatDate(l.created_at)}</div>
    </div>
  `).join('');
}

// ===== ISLANDS PAGE =====
async function loadIslandsPage() {
  const res = await fetch(`${API}/api/islands?exclude=${myIsland.id}`);
  const islands = await res.json();
  const el = document.getElementById('islands-grid');
  if (!islands.length) {
    el.innerHTML = `<div class="empty-state" style="grid-column:1/-1"><span class="icon">🌊</span><p>아직 다른 섬이 없어요</p></div>`;
    return;
  }
  el.innerHTML = islands.map(isl => {
    const tree = getTreeEmoji(isl.tree_type);
    return `
      <div class="island-card" onclick="writeToIsland('${isl.id}', '${escHtml(isl.island_name)}', '${isl.color}', '${escHtml(isl.name)}')">
        <div style="font-size:2rem;background:${isl.color}22;border-radius:50%;width:52px;height:52px;display:flex;align-items:center;justify-content:center;margin:0 auto">${tree}</div>
        <div class="island-card-name">${escHtml(isl.island_name)} 섬</div>
        <div class="island-card-resident">${escHtml(isl.name)} 거주</div>
        <button class="btn btn-primary btn-sm" style="margin-top:8px;font-size:0.78rem;padding:5px 10px">편지 쓰기</button>
      </div>
    `;
  }).join('');
}

function getTreeEmoji(type) {
  const map = { palm:'🌴', cherry:'🌸', pine:'🌲', oak:'🌳' };
  return map[type] || '🌳';
}

function writeToIsland(id, islandName, color, residentName) {
  showPage('write');
  const sel = document.getElementById('select-target-island');
  // wait for dropdown to populate
  setTimeout(() => {
    sel.value = id;
    sel.dispatchEvent(new Event('change'));
  }, 300);
}

// ===== MODAL =====
let currentLetterId = null;
function openLetter(id, fromName, content, date, color, fromIslandId, isSent = false) {
  currentLetterId = id;
  modalReplyTarget = isSent ? null : fromIslandId;
  document.getElementById('modal-title').textContent = isSent ? '📤 보낸 편지' : '📬 받은 편지';
  document.getElementById('modal-from').innerHTML = `
    <span class="island-dot" style="background:${color};display:inline-block;width:10px;height:10px;border-radius:50%;margin-right:4px;"></span>
    ${isSent ? '→ ' : '← '} ${fromName} 섬
  `;
  document.getElementById('modal-content').textContent = content;
  document.getElementById('modal-date').textContent = formatDate(date);
  document.getElementById('modal-reply-btn').style.display = isSent ? 'none' : 'inline-flex';
  document.getElementById('letter-modal').classList.remove('hidden');

  // Mark as read
  if (!isSent) {
    fetch(`${API}/api/letters/${id}/read`, { method: 'PATCH' });
  }
}

function closeModal() {
  document.getElementById('letter-modal').classList.add('hidden');
}

function replyToLetter() {
  if (!modalReplyTarget) return;
  closeModal();
  showPage('write');
  setTimeout(() => {
    const sel = document.getElementById('select-target-island');
    sel.value = modalReplyTarget;
    sel.dispatchEvent(new Event('change'));
  }, 300);
}

// ===== UNREAD =====
async function checkUnread() {
  const res = await fetch(`${API}/api/letters/unread/${myIsland.id}`);
  const data = await res.json();
  const badge = document.getElementById('unread-badge');
  if (data.count > 0) {
    badge.textContent = data.count;
    badge.classList.remove('hidden');
    // Animate mailbox flag
    const flag = document.getElementById('mailbox-flag');
    if (flag) { flag.setAttribute('transform', 'rotate(-45, 330, 158)'); }
  } else {
    badge.classList.add('hidden');
    const flag = document.getElementById('mailbox-flag');
    if (flag) { flag.removeAttribute('transform'); }
  }
}

// ===== CHAR COUNT =====
document.addEventListener('DOMContentLoaded', () => {
  const ta = document.getElementById('letter-content');
  if (ta) {
    ta.addEventListener('input', () => {
      document.getElementById('char-count').textContent = ta.value.length;
    });
  }
});

// ===== FLYING LETTER =====
function spawnFlyingLetter() {
  const el = document.getElementById('flying-letter');
  el.classList.remove('hidden');
  el.style.left = '50%';
  el.style.top = '50%';
  el.style.transform = 'translate(-50%,-50%)';
  setTimeout(() => el.classList.add('hidden'), 1600);
}

// ===== COPY ID =====
function copyIslandId() {
  navigator.clipboard.writeText(myIsland.id).then(() => showToast('섬 ID가 복사됐어요! 📋'));
}

// ===== TOAST =====
let toastTimer;
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => t.classList.remove('show'), 2800);
}

// ===== HELPERS =====
function escHtml(str) {
  return (str||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');
}

function formatDate(dt) {
  const d = new Date(dt);
  return `${d.getFullYear()}.${String(d.getMonth()+1).padStart(2,'0')}.${String(d.getDate()).padStart(2,'0')} ${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}`;
}

// Close modal on overlay click
document.getElementById('letter-modal').addEventListener('click', function(e) {
  if (e.target === this) closeModal();
});

// Auto-refresh unread every 30s
setInterval(checkUnread, 30000);
</script>
</body>
</html>
